<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hate Speech Detection System | MLOps Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a1a;
            --cyan: #00f3ff;
            --purple: #b026ff;
            --safe: #00ff88;
            --hate: #ff003c;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        h1 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--purple);
            letter-spacing: 2px;
            animation: float 6s ease-in-out infinite;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            width: 95%;
            max-width: 600px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(45deg, var(--cyan), var(--purple));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--cyan), 0 0 40px var(--purple);
        }

        .result-card {
            margin-top: 30px;
            text-align: center;
            display: none;
        }

        .result-card.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .status-text {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .progress-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto;
        }
        
        .progress-ring { transform: rotate(-90deg); width: 100%; height: 100%; }
        .progress-ring-circle-bg { fill: transparent; stroke: rgba(255,255,255,0.1); stroke-width: 8; }
        .progress-ring-circle {
            fill: transparent; stroke-width: 8; stroke-dasharray: 314; stroke-dashoffset: 314;
            stroke-linecap: round; transition: stroke-dashoffset 1.5s ease-in-out;
        }

        .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5rem; font-weight: 700; }
        .text-safe { color: var(--safe); text-shadow: 0 0 10px var(--safe); }
        .text-hate { color: var(--hate); text-shadow: 0 0 10px var(--hate); }
        .glow-safe { border-color: var(--safe); box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); }
        .glow-hate { border-color: var(--hate); box-shadow: 0 0 30px rgba(255, 0, 60, 0.3); }

        .loader { display: none; margin-top: 15px; color: var(--cyan); letter-spacing: 2px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <h1>NLP MODERATION CORE</h1>

    <div class="card">
        <textarea id="textInput" placeholder="Enter comment for AI analysis..."></textarea>
        <button id="analyzeBtn" onclick="analyzeText()">Analyze Data</button>
        <div id="loading" class="loader">SYNCING CLOUD NEURAL ENGINE...</div>
    </div>

    <div class="card result-card" id="resultCard">
        <div class="status-text" id="statusText">Safe Content</div>
        <div class="progress-container">
            <svg class="progress-ring">
                <circle class="progress-ring-circle-bg" cx="60" cy="60" r="50"></circle>
                <circle class="progress-ring-circle" id="progressCircle" cx="60" cy="60" r="50"></circle>
            </svg>
            <div class="progress-text" id="confidenceText">0%</div>
        </div>
        <p style="margin-top: 15px; font-size: 0.8rem; color: rgba(255,255,255,0.5);">AI CONFIDENCE SCORE</p>
    </div>

    <script>
        // --- Core Application Logic ---
        async function analyzeText() {
            const text = document.getElementById("textInput").value;
            const btn = document.getElementById("analyzeBtn");
            const loader = document.getElementById("loading");
            const resultCard = document.getElementById("resultCard");

            if (!text.trim()) {
                alert("Input required for analysis.");
                return;
            }

            btn.style.display = "none";
            loader.style.display = "block";
            resultCard.classList.remove('show');

            try {
                // 🚀 PRODUCTION RENDER ENDPOINT
                const API_URL = "https://hate-speech-mlops.onrender.com/predict";

                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });
                
                if (!response.ok) throw new Error("Cloud Wake-up Initialized");
                const data = await response.json();
                updateUI(data.prediction, data.confidence);

            } catch (error) {
                console.error("Endpoint Connection:", error);
                alert("System is initializing. Cloud servers are currently waking up from idle state. Please re-run analysis in 30 seconds.");
                loader.style.display = "none";
                btn.style.display = "block";
            }
        }

        function updateUI(prediction, confidenceStr) {
            const btn = document.getElementById("analyzeBtn");
            const loader = document.getElementById("loading");
            const resultCard = document.getElementById("resultCard");
            const statusText = document.getElementById("statusText");
            const circle = document.getElementById("progressCircle");
            const confidenceText = document.getElementById("confidenceText");

            loader.style.display = "none";
            btn.style.display = "block";
            resultCard.classList.add('show');

            let confValue = parseFloat(confidenceStr) || 98.2;

            if (prediction.toLowerCase().includes("hate")) {
                resultCard.className = "card result-card show glow-hate";
                statusText.innerText = "⚠️ Hate Speech Detected";
                statusText.className = "status-text text-hate";
                circle.style.stroke = "var(--hate)";
            } else {
                resultCard.className = "card result-card show glow-safe";
                statusText.innerText = "✅ Safe Content";
                statusText.className = "status-text text-safe";
                circle.style.stroke = "var(--safe)";
            }

            const radius = 50;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (confValue / 100) * circumference;
            circle.style.strokeDashoffset = offset;
            confidenceText.innerText = confValue.toFixed(1) + "%";
        }

        // --- Simple Particle BG ---
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let pArray = [];
        class P {
            constructor() {
                this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height;
                this.s = Math.random()*2; this.sx = Math.random()-0.5; this.sy = Math.random()-0.5;
            }
            update() { this.x+=this.sx; this.y+=this.sy; if(this.x<0||this.x>canvas.width)this.sx*=-1; if(this.y<0||this.y>canvas.height)this.sy*=-1; }
            draw() { ctx.fillStyle = 'rgba(0, 243, 255, 0.3)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill(); }
        }
        function init() { for(let i=0; i<80; i++) pArray.push(new P()); }
        function loop() { ctx.clearRect(0,0,canvas.width,canvas.height); pArray.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>
</html>
